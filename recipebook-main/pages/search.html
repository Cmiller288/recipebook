<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Recipes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles/recipe-styles.css">
</head>

<body>

    <header class="bg-dark text-white p-3">
        <div class="container d-flex justify-content-between">
            <h1>Search Recipes</h1>
            <div>
                <a href="recipes.html" class="btn btn-info">Back to Recipes</a>
                <button id="logout-btn" class="btn btn-warning">Logout</button>
            </div>
        </div>
    </header>

    <main class="container mt-4">
        <section class="mb-3">
            <div class="row g-2">
                <div class="col-md-6">
                    <input type="text" id="search-input" class="form-control"
                        placeholder="Search title, category or description...">
                </div>
                <div class="col-md-3">
                    <select id="category-select" class="form-select">
                        <option value="all">All categories</option>
                    </select>
                </div>
                <div class="col-md-3 text-end">
                    <small id="result-count" class="text-muted"></small>
                </div>
            </div>
        </section>

        <section>
            <div id="search-results" class="row"></div>
        </section>

    </main>

    <script src="../scripts/search.js"></script>
</body>

</html>
