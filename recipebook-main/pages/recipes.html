<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Recipes</title>
    <link rel="stylesheet" href="../styles/recipe-styles.css">
</head>

<body>

    <header class="bg-dark text-white p-3">
        <div class="container d-flex justify-content-between">
            <h1>My Recipe Collection</h1>
            <div>
                <a href="dashboard.html" class="btn btn-info">Dashboard</a>
                <button id="logout-btn" class="btn btn-warning">Logout</button>
            </div>
        </div>
    </header>

    <main class="container mt-4">

        <section class="mb-3">
            <input type="text" id="search-input" class="form-control mb-2" placeholder="Search recipes...">
            <select id="sort-select" class="form-select">
                <option value="az">Sort A–Z</option>
                <option value="za">Sort Z–A</option>
            </select>
        </section>

        <section>
            <div id="recipe-container" class="row"></div>
        </section>

    </main>

    <script src="../scripts/recipe-script.js"></script>
</body>

</html>
