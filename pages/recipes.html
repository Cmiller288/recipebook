<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- neutral favicon to stop 404 errors -->
    <link rel="icon" href="data:;base64,=">
    <title>My Recipes</title>
    <!-- preload stylesheet to reduce flash of unstyled content -->
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" as="style" onload="this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"></noscript>
    <link rel="stylesheet" href="../styles/recipe-styles.css">
</head>

<body>


    <main class="container mt-4">

        <section class="mb-3">
            <input type="text" id="search-input" class="form-control mb-2" placeholder="Search recipes...">
            <select id="sort-select" class="form-select">
                <option value="az">Sort A–Z</option>
                <option value="za">Sort Z–A</option>
            </select>
        </section>

        <section class="mb-4">
            <div class="card p-4">
                <h3 class="h5">Recipe Notes</h3>
                <form id="note-form" class="row g-3">
                    <div class="col-md-5">
                        <label for="note-recipe" class="form-label">Recipe</label>
                        <select id="note-recipe" class="form-select">
                            <option value="">Choose a recipe</option>
                        </select>
                    </div>
                    <div class="col-md-7">
                        <label for="note-text" class="form-label">Personal note</label>
                        <textarea id="note-text" class="form-control" rows="3" placeholder="Add your own cooking tips or reminders"></textarea>
                    </div>
                    <div class="col-12 text-end">
                        <button type="submit" class="btn btn-secondary">Save Note</button>
                    </div>
                </form>
                <div id="note-message" class="mt-3 text-success"></div>
                <div id="saved-note" class="mt-3 text-muted"></div>
            </div>
        </section>

        <section>
            <div id="recipe-container" class="row"></div>
        </section>

    </main>

    <script src="../scripts/common.js" defer></script>
    <script src="../scripts/recipe-script.js" defer></script>
</body>

</html>
