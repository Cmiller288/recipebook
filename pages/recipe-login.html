<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- neutral favicon avoids missing icon request -->
  <link rel="icon" href="data:;base64,=">
  <title>Recipe Book Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../styles/recipe-styles.css">
</head>

<body class="container mt-5">

  <h2>Personal Recipe Book Login</h2>

  <form id="loginForm" class="mt-4">
    <div class="mb-3">
      <label for="username" class="form-label">Username</label>
      <input type="text" id="username" class="form-control" required>
    </div>

    <div class="mb-3">
      <label for="password" class="form-label">Password</label>
      <input type="password" id="password" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-primary">Login</button>
    <div id="message" class="mt-3"></div>
  </form>

  <script src="../scripts/recipe-script.js"></script>

	<footer class="bg-dark text-white p-3 mt-5">
		<div class="container d-flex flex-column flex-md-row justify-content-between align-items-center">
			<div>
				
         <span class="mb-2 mb-md-0">@2026 My Personal Cookbook. All rights reserved.</span>
				<a href="https://github.com/Cmiller288/recipebook" target="_blank" class="text-white me-3">View source</a>
				<a href="https://github.com/Cmiller288" target="_blank" class="btn btn-outline-light btn-sm">GitHub Profile</a>
			</div>
		</div>
	</footer>

</body>

</html>
